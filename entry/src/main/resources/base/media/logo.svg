<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280" style="background:transparent">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="100%" style="stop-color:#E8960F"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->


  <!-- Connecting line: W to R (diagonal) -->
  <line x1="120" y1="110" x2="160" y2="170" stroke="#F5A623" stroke-width="16" stroke-linecap="round"/>
  <!-- Connecting line: D to R (diagonal) -->
  <line x1="280" y1="110" x2="240" y2="170" stroke="#F5A623" stroke-width="16" stroke-linecap="round"/>
  <!-- Connecting line: W to D (horizontal) -->
  <line x1="133" y1="75" x2="267" y2="75" stroke="#F5A623" stroke-width="16" stroke-linecap="round"/>

  <!-- W Circle (top left) -->
  <circle cx="75" cy="75" r="58" fill="#F5A623" filter="url(#shadow)"/>
  <circle cx="75" cy="75" r="58" fill="none" stroke="#F5A623" stroke-width="4"/>
  <text x="75" y="93" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="56" fill="#1A237E">W</text>

  <!-- D Circle (top right) -->
  <circle cx="325" cy="75" r="58" fill="#F5A623" filter="url(#shadow)"/>
  <circle cx="325" cy="75" r="58" fill="none" stroke="#F5A623" stroke-width="4"/>
  <text x="325" y="93" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="56" fill="#1A237E">D</text>

  <!-- R Circle (bottom center) -->
  <circle cx="200" cy="210" r="58" fill="#F5A623" filter="url(#shadow)"/>
  <circle cx="200" cy="210" r="58" fill="none" stroke="#F5A623" stroke-width="4"/>
  <text x="200" y="228" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="56" fill="#1A237E">R</text>

</svg>
